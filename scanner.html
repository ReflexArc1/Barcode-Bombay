<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<div id="scanner"></div>
<div id="result"></div>
<button id="nextScan" style="display:none;margin-top:20px;font-size:18px;padding:10px 20px;">
Scan Next Ticket
</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbzaIFrMpVuQhTx8EqyKQv-TrP7LaC5R6QWVbg8XuqjtTh9QhDHN-2hRDTXWYt7gOG2U/exec";

let scanning = true;

function startScanner(){

Quagga.init({
inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},
decoder:{
readers:["code_128_reader"]
}
},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();
scanning = true;

});

}

Quagga.onDetected(function(result){

if(!scanning) return;

scanning = false;

const code = result.codeResult.code;

Quagga.stop();

fetch(API + "?verify=" + code)
.then(r=>r.json())
.then(data=>{

const el = document.getElementById("result");

if(data.status==="valid"){
el.innerHTML="VALID TICKET";
el.style.color="green";
}

else if(data.status==="used"){
el.innerHTML="ALREADY USED";
el.style.color="orange";
}

else{
el.innerHTML="INVALID";
el.style.color="red";
}

document.getElementById("nextScan").style.display="inline-block";

});

});

document.getElementById("nextScan").onclick=function(){

document.getElementById("result").innerHTML="";
this.style.display="none";

startScanner();

};

startScanner();

</script>
