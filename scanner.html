<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Bombay Scanner</title>
<!-- CHANGED: ZXing instead of Quagga -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:20px;}
h1{color:#ff3c3c;}
#scanner{width:100%;max-width:420px;height:320px;margin:auto;border-radius:12px;overflow:hidden;background:black;position:relative;}
#scanner video{width:100%;height:100%;object-fit:cover;}
.result{margin-top:20px;font-size:28px;font-weight:bold;padding:20px;border-radius:10px;}
.valid{background:#1e4620;color:#4caf50;}
.invalid{background:#4a1e1e;color:#f44336;}
.used{background:#4a3b1e;color:#ff9800;}
button{margin-top:20px;padding:12px 24px;font-size:18px;border:none;border-radius:10px;cursor:pointer;background:#ff3c3c;color:white;}
.stats{margin-top:20px;opacity:.8;}
#debug{margin-top:8px;font-size:12px;color:#888;word-break:break-all;}
</style>
</head>
<body>
<h1>🎫 Barcode Bombay Scanner</h1>
<div id="scanner"><video id="video" playsinline muted></video></div>
<div id="result"></div>
<div id="debug"></div>
<button id="nextBtn" style="display:none">Scan Next Ticket</button>
<div class="stats">
  Total: <span id="total">0</span> |
  Valid: <span id="valid">0</span> |
  Invalid: <span id="invalid">0</span>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzaIFrMpVuQhTx8EqyKQv-TrP7LaC5R6QWVbg8XuqjtTh9QhDHN-2hRDTXWYt7gOG2U/exec";
let stats = { total: 0, valid: 0, invalid: 0 };
let codeReader;

function showResult(type, text) {
  document.getElementById("result").innerHTML =
    '<div class="result ' + type + '">' + text + '</div>';
}

function updateStats() {
  document.getElementById("total").innerText = stats.total;
  document.getElementById("valid").innerText = stats.valid;
  document.getElementById("invalid").innerText = stats.invalid;
}

async function verifyTicket(ticket) {
  showResult("invalid", "⏳ Checking...");
  try {
    const res = await fetch(API + "?verify=" + encodeURIComponent(ticket), { redirect: "follow" });
    const data = await res.json();
    stats.total++;
    if (data.status === "valid") {
      stats.valid++;
      showResult("valid", "✅ VALID TICKET");
    } else if (data.status === "used") {
      showResult("used", "⚠️ ALREADY USED");
    } else {
      stats.invalid++;
      showResult("invalid", "❌ INVALID TICKET");
    }
    updateStats();
  } catch(e) {
    showResult("invalid", "⚠️ Connection Error");
  }
  document.getElementById("nextBtn").style.display = "inline-block";
}

function startScanner() {
  document.getElementById("result").innerHTML = "";
  document.getElementById("debug").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  // CHANGED: ZXing reader
  codeReader = new ZXing.BrowserMultiFormatReader();
  codeReader.decodeFromVideoDevice(null, "video", (result, err) => {
    if (result) {
      const code = result.getText().trim();
      document.getElementById("debug").innerText = "Scanned: " + code;
      codeReader.reset(); // stop scanning
      verifyTicket(code);
    }
  });
}

document.getElementById("nextBtn").onclick = function () {
  if (codeReader) codeReader.reset();
  startScanner();
};

startScanner();
</script>
</body>
</html>
