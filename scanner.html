<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>

class BarcodeScanner {

constructor(){
this.scanning=false;
this.stats={total:0,valid:0,invalid:0};

this.resultDiv=document.getElementById("result");
this.nextBtn=document.getElementById("nextTicketBtn");

this.startBtn=document.getElementById("startBtn");
this.stopBtn=document.getElementById("stopBtn");

this.startBtn.onclick=()=>this.start();
this.stopBtn.onclick=()=>this.stop();
this.nextBtn.onclick=()=>this.next();

}

start(){

this.show("scanning","📷 Starting camera...");

Quagga.init({
inputStream:{
type:"LiveStream",
target:document.querySelector("#video").parentElement,
constraints:{
facingMode:"environment"
}
},
decoder:{
readers:["code_128_reader"]
}
},err=>{

if(err){
console.error(err);
this.show("invalid","Camera error");
return;
}

Quagga.start();
this.scanning=true;
this.show("scanning","📸 Point camera at barcode");

});

Quagga.onDetected((data)=>{

if(!this.scanning)return;

this.scanning=false;

const code=data.codeResult.code;

Quagga.stop();

this.verify(code);

});

}

stop(){

Quagga.stop();
this.scanning=false;
this.show("","Camera stopped");

}

next(){

this.nextBtn.style.display="none";
this.start();

}

async verify(ticketId){

this.show("scanning","🔄 Verifying ticket...");

try{

const res=await fetch(
"https://script.google.com/macros/s/AKfycbzaIFrMpVuQhTx8EqyKQv-TrP7LaC5R6QWVbg8XuqjtTh9QhDHN-2hRDTXWYt7gOG2U/exec?verify="+ticketId
);

const data=await res.json();

this.stats.total++;

if(data.status==="valid"){

this.stats.valid++;

this.show("valid","✅ VALID TICKET<br>"+ticketId);

this.flash("green");

}else if(data.status==="used"){

this.stats.invalid++;

this.show("invalid","⚠️ ALREADY USED<br>"+ticketId);

this.flash("red");

}else{

this.stats.invalid++;

this.show("invalid","❌ INVALID<br>"+ticketId);

this.flash("red");

}

this.updateStats();

}catch(e){

this.show("invalid","Connection error");

}

this.nextBtn.style.display="inline-block";

}

show(type,msg){

this.resultDiv.innerHTML=
`<div class="result ${type}">${msg}</div>`;

}

flash(color){

const f=document.getElementById("flash");
f.className="flash-effect flash-"+color;

setTimeout(()=>f.className="flash-effect",300);

}

updateStats(){

document.getElementById("totalScanned").innerText=this.stats.total;
document.getElementById("validCount").innerText=this.stats.valid;
document.getElementById("invalidCount").innerText=this.stats.invalid;
document.getElementById("lastScan").innerText=new Date().toLocaleTimeString();

}

}

let scanner;

document.addEventListener("DOMContentLoaded",()=>{
scanner=new BarcodeScanner();
});

</script>
