<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barcode Bombay Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#ff3c3c;
}

#scanner{
width:100%;
max-width:420px;
height:320px;
margin:auto;
border-radius:12px;
overflow:hidden;
background:black;
}

#scanner video{
width:100%;
height:100%;
object-fit:cover;
}

.result{
margin-top:20px;
font-size:28px;
font-weight:bold;
padding:20px;
border-radius:10px;
}

.valid{
background:#1e4620;
color:#4caf50;
}

.invalid{
background:#4a1e1e;
color:#f44336;
}

.used{
background:#4a3b1e;
color:#ff9800;
}

button{
margin-top:20px;
padding:12px 24px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff3c3c;
color:white;
}

.stats{
margin-top:20px;
opacity:.8;
}

</style>

</head>

<body>

<h1>🎫 Barcode Bombay Scanner</h1>

<div id="scanner"></div>

<div id="result"></div>

<button id="nextBtn" style="display:none">
Scan Next Ticket
</button>

<div class="stats">
Total: <span id="total">0</span> |
Valid: <span id="valid">0</span> |
Invalid: <span id="invalid">0</span>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzaIFrMpVuQhTx8EqyKQv-TrP7LaC5R6QWVbg8XuqjtTh9QhDHN-2hRDTXWYt7gOG2U/exec";

let scanning=true;

let stats={
total:0,
valid:0,
invalid:0
};

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();
scanning=true;

});

}

Quagga.onDetected(function(result){

if(!scanning)return;

scanning=false;

let code = result.codeResult.code;

code = code.replace(/\s/g,'').trim();

Quagga.stop();

document.getElementById("result").innerHTML =
'<div class="result invalid">SCANNED:<br>'+code+'</div>';

verifyTicket(code);

});

async function verifyTicket(ticket){

document.getElementById("result").innerHTML="Checking...";

try{

const res = await fetch(
API + "?verify=" + encodeURIComponent(ticket.trim())
);

const data = await res.json();

stats.total++;

if(data.status === "valid"){

stats.valid++;
showResult("valid","✅ VALID TICKET");

}
else if(data.status === "used"){

showResult("used","⚠️ ALREADY USED");

}
else{

stats.invalid++;
showResult("invalid","❌ INVALID TICKET");

}
function showResult(type,text){

document.getElementById("result").innerHTML =
'<div class="result '+type+'">'+text+'</div>';

}
updateStats();

}catch(e){

console.error(e);

document.getElementById("result").innerHTML =
'<div class="result invalid">Connection Error</div>';

}

document.getElementById("nextBtn").style.display="inline-block";

}

function updateStats(){

document.getElementById("total").innerText=stats.total;
document.getElementById("valid").innerText=stats.valid;
document.getElementById("invalid").innerText=stats.invalid;

}

document.getElementById("nextBtn").onclick=function(){

this.style.display="none";

document.getElementById("result").innerHTML="";

startScanner();

};

startScanner();

</script>

</body>
</html>
