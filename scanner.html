<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:30px;
}

#scanner{
width:400px;
margin:auto;
}

#result{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

.valid{color:green;}
.invalid{color:red;}
.used{color:orange;}
</style>

</head>

<body>

<h2>Barcode Bombay Scanner</h2>

<div id="scanner"></div>
<div id="result"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzaIFrMpVuQhTx8EqyKQv-TrP7LaC5R6QWVbg8XuqjtTh9QhDHN-2hRDTXWYt7gOG2U/exec";

Quagga.init({
inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},
decoder:{
readers:["code_128_reader"]
}
},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

const code = result.codeResult.code;

fetch(API + "?verify=" + code)
.then(r=>r.json())
.then(data=>{

const el = document.getElementById("result");

if(data.status==="valid"){
el.innerHTML="VALID TICKET";
el.className="valid";
}

else if(data.status==="used"){
el.innerHTML="ALREADY USED";
el.className="used";
}

else{
el.innerHTML="INVALID";
el.className="invalid";
}

});

});

</script>

</body>
</html>
