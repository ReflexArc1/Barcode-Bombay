<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Bombay | POPROCKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rubik+Glitch&display=swap" rel="stylesheet">
    <style>
        :root {
            --acid-yellow: #eaff00;
            --neon-red: #ff003c;
            --neon-blue: #0022ff;
            --neon-green: #39ff14;
            --black: #050505;
        }

        /* Added box-sizing to keep borders from breaking the width */
        * {
            box-sizing: border-box; 
        }

        body {
            background-color: var(--acid-yellow);
            background-image: radial-gradient(var(--black) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--black);
            font-family: 'Archivo Black', sans-serif;
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* Scrolling Marquee Tape */
        .marquee {
            background-color: var(--black);
            color: var(--acid-yellow);
            padding: 12px 0;
            white-space: nowrap;
            overflow: hidden;
            border-bottom: 6px solid var(--neon-red);
            font-size: 1.5rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Header Area */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            border-bottom: 10px solid var(--black);
            background-color: var(--neon-red);
            color: var(--acid-yellow);
            position: relative;
        }
        header h1 {
            font-family: 'Rubik Glitch', cursive;
            font-size: 6vw;
            margin: 0;
            text-shadow: 5px 5px 0 var(--black), -5px -5px 0 var(--neon-blue);
            line-height: 0.9;
        }
        
        header p {
            font-size: 1.5rem;
            background-color: var(--black);
            color: white;
            display: inline-block;
            padding: 5px 20px;
            margin-top: 20px;
            transform: rotate(-3deg);
            border: 3px solid white;
        }

        /* Main Content */
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
            width: 100%;
        }

        .ticket-card {
            background-color: white;
            border: 10px solid var(--black);
            box-shadow: 20px 20px 0px var(--neon-blue);
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        /* Spinning Starburst Element */
        .ticket-card::before {
            content: "💥";
            font-size: 5rem;
            position: absolute;
            top: -40px;
            left: -40px;
            filter: drop-shadow(4px 4px 0px var(--black));
            animation: spin 5s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .event-title {
            font-family: 'Rubik Glitch', cursive;
            color: var(--neon-blue);
            font-size: 4.5rem;
            margin: 0 0 20px 0;
            text-shadow: 4px 4px 0 var(--black), 8px 8px 0 var(--neon-green);
            line-height: 1;
        }

        /* Tear-off ticket details */
        .details {
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 30px;
            border-top: 6px dashed var(--black);
            border-bottom: 6px dashed var(--black);
            padding: 25px 0;
            background-color: var(--acid-yellow);
        }
        .details p { margin: 12px 0; }
        
        .highlight {
            background-color: var(--black);
            color: var(--neon-green);
            padding: 5px 15px;
            display: inline-block;
            transform: rotate(2deg);
            border: 2px solid white;
        }

        /* Checkout Box */
        .buy-button-container {
            margin-top: 30px;
            background: var(--neon-red);
            padding: 25px;
            border: 6px solid var(--black);
            transform: rotate(-1deg);
            transition: transform 0.2s;
        }
        .buy-button-container:hover {
            transform: rotate(1deg) scale(1.02);
        }

        /* Bottom Barcode Motif */
        .barcode {
            font-family: monospace;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: -4px;
            overflow: hidden;
            white-space: nowrap;
            margin-top: 60px;
            background: var(--black);
            color: white;
            padding: 20px 0;
        }

        /* --- MOBILE FIXES --- */
        @media (max-width: 600px) {
            header h1 { 
                font-size: 3.5rem; 
                text-shadow: 3px 3px 0 var(--black), -3px -3px 0 var(--neon-blue);
            }
            .container {
                margin: 30px auto;
                padding: 15px;
            }
            .ticket-card {
                padding: 30px 15px;
                border-width: 6px;
                box-shadow: 12px 12px 0px var(--neon-blue); /* Shrink shadow to fit screen */
            }
            .ticket-card::before {
                font-size: 3.5rem;
                top: -25px;
                left: -15px; /* Pull the explosion inward */
            }
            .event-title {
                font-size: 3.2rem; /* Shrink title so it doesn't break boundaries */
                text-shadow: 3px 3px 0 var(--black), 5px 5px 0 var(--neon-green);
            }
            .details {
                font-size: 1.1rem;
                padding: 15px 0;
            }
            .buy-button-container {
                padding: 15px;
            }
            .barcode {
                font-size: 2rem;
                letter-spacing: -2px;
            }
        }
    </style>
</head>
<body>

    <div class="marquee">
        <span>⚠️ TICKETS OUT SOON ⚠️ NO PRE-BOOZING, JUST BYOB ⚠️ LIVE BANDS ⚠️ BARCODE BOMBAY VOLUME 1 ⚠️ POPROCKS ⚠️ </span>
    </div>

    <header>
        <h1>BARCODE<br>BOMBAY</h1>
        <p>VOLUME 01</p>
    </header>

    <div class="container">
        <div class="ticket-card">
            <h2 class="event-title">POPROCKS</h2>
            
            <div class="details">
                <p>📅 <strong>18TH MARCH 2026</strong> | 5:00 PM</p>
                <p>📍 <strong>THE LITTLE HOUSE</strong>, VERSOVA</p>
                <div class="highlight">LIVE BANDS | BYOB</div>
            </div>

            <div class="buy-button-container">
                <form><script src="https://checkout.razorpay.com/v1/payment-button.js" data-payment_button_id="pl_SP7bHiQDv9yRwp" async> </script> </form>
                </div>
        </div>
    </div>

    <div class="barcode">
        |||| | || | |||| || | || | |||| | || | |||| || | || | |||| | || 
    </div>

</body>
</html>
