<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Bombay | POPROCKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070707;
            --card-bg: #121212;
            --text: #e0e0e0;
            --acid: #ccff00; /* Toxic acid yellow/green */
            --border: #222222;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            /* Microscopic grunge grid texture */
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Smooth, subtle marquee */
        .marquee {
            background-color: var(--acid);
            color: var(--bg);
            padding: 8px 0;
            white-space: nowrap;
            overflow: hidden;
            font-family: 'Archivo Black', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 20px 20px;
        }
        header h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            color: white;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }
        header span.acid-text {
            color: var(--acid);
        }

        /* Main Content Container */
        .container {
            max-width: 550px;
            margin: 0 auto 80px;
            padding: 20px;
            width: 100%;
        }

        /* Minimal Grunge Card */
        .ticket-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            box-shadow: 8px 8px 0px rgba(204, 255, 0, 0.05); /* Very subtle acid shadow */
            padding: 50px 40px;
            text-align: center;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease, border-color 0.4s ease;
        }
        
        /* Smooth Hover Glow */
        .ticket-card:hover {
            transform: translateY(-5px);
            box-shadow: 10px 15px 0px rgba(204, 255, 0, 0.2); 
            border-color: var(--acid);
        }

        /* Corner Tech Accents */
        .ticket-card::before, .ticket-card::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--acid);
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .ticket-card::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .ticket-card::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        .ticket-card:hover::before, .ticket-card:hover::after { opacity: 1; }

        .event-title {
            font-family: 'Archivo Black', sans-serif;
            color: white;
            font-size: 3.8rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--acid);
            color: var(--acid);
            padding: 4px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        /* Details */
        .details {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 25px 0;
            border-top: 1px dashed #333;
            border-bottom: 1px dashed #333;
            color: #888;
        }
        .details strong {
            color: white;
            font-weight: normal;
        }

        /* Checkout Box Area */
        .buy-button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        /* Aesthetic Barcode Footer */
        .barcode {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            color: #222;
            text-align: center;
            letter-spacing: -2px;
            margin-top: 50px;
            user-select: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header { padding: 50px 20px 10px; }
            header h1 { font-size: 2.2rem; }
            .ticket-card { padding: 40px 25px; }
            .event-title { font-size: 2.8rem; }
            .details { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="marquee">
        <span>VOL 01 // TICKETS OUT SOON // NO PRE-BOOZING JUST BYOB // LIVE BANDS // BARCODE BOMBAY // POPROCKS // </span>
    </div>

    <header>
        <h1>BARCODE <span class="acid-text">BOMBAY</span></h1>
    </header>

    <div class="container">
        <div class="ticket-card">
            <h2 class="event-title">POPROCKS</h2>
            <div class="badge">Volume 01</div>
            
            <div class="details">
                <p>DATE // <strong>18TH MARCH 2026</strong></p>
                <p>TIME // <strong>5:00 PM</strong></p>
                <p>LOC // <strong>THE LITTLE HOUSE, VERSOVA</strong></p>
            </div>

            <div class="buy-button-container">
                </div>
        </div>
        
        <div class="barcode">
            ||| || ||| | ||| || ||| | ||| || |||
        </div>
    </div>

</body>
</html>
