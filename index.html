<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Landing Page</title>
    <style>
        :root {
            --primary-red: #ff2a2a;
            --accent-blue: #00d4ff;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--accent-blue);
            font-family: 'SF Mono', 'Fira Code', 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* The Grid provided from your snippet, updated to the blue accent color */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 212, 255, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Subtle noise texture overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.06"/%3E%3C/svg%3E');
            pointer-events: none;
            z-index: 10;
        }

        /* TOP NAVIGATION */
        .top-section {
            display: flex;
            justify-content: space-between;
            padding: 40px 50px;
            font-size: 13px;
            letter-spacing: 1.5px;
            z-index: 1;
        }

        .nav-links p {
            margin: 0 0 8px 0;
            cursor: pointer;
            transition: text-shadow 0.2s;
        }

        .nav-links p:hover {
            text-shadow: 0 0 8px var(--accent-blue);
        }

        .contact-btn {
            border: 1px solid var(--accent-blue);
            padding: 12px 24px;
            height: fit-content;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1) inset;
        }

        .contact-btn:hover {
            background-color: var(--accent-blue);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        /* MIDDLE TECHNICAL TEXT */
        .middle-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            margin-top: 5vh;
            font-size: 11px;
            z-index: 1;
        }

        .tech-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .large-kanji {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .tech-details p {
            margin: 2px 0;
            opacity: 0.8;
        }

        .text-right {
            text-align: right;
        }

        /* BOTTOM SECTION - GLOWING RED BARCODE */
        .bottom-section {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 8vh;
            z-index: 1;
        }

        .barcode-container {
            display: flex;
            height: 200px; /* Adjust height as needed */
            width: 75%;
            max-width: 1000px;
            gap: 3px;
            justify-content: space-between;
        }

        .bar {
            height: 100%;
            background-color: var(--primary-red);
            /* This drop shadow creates the neon glow on each individual bar */
            box-shadow: 0 0 10px var(--primary-red), 0 0 25px var(--primary-red);
            border-radius: 1px;
        }

        /* Varying widths for the barcode lines */
        .w-1 { flex: 0.5; }
        .w-2 { flex: 1.5; }
        .w-3 { flex: 2.5; }
        .w-4 { flex: 4; }
        .w-5 { flex: 6; }
        .w-space { flex: 3; background: transparent; box-shadow: none; }

    </style>
</head>
<body>

    <div class="top-section">
        <div class="nav-links">
            <p>[01] ABOUT</p>
            <p>[02] WHAT WE DO</p>
            <p>[03] WHAT WE'VE BUILT</p>
            <p>[04] HOW WE BUILD</p>
            <p>[05] WHAT PEOPLE SAY</p>
        </div>
        <div class="contact-btn">
            TELL US ABOUT YOUR PROJECT
        </div>
    </div>

    <div class="middle-section">
        <div class="tech-block">
            <span class="large-kanji">ソフトウェア</span>
            <div class="tech-details">
                <p>PN: R-M114-XY7</p>
                <p>DO NOT REMOVE DURING OPERATION</p>
            </div>
        </div>
        
        <div class="tech-block">
            <div class="tech-details text-right">
                <p>BATCH: 11/2026-B3</p>
                <p>TOL: ±0.015MM</p>
                <p>SN: 994321-K</p>
                <p>MAT: TI-6AL-4V</p>
            </div>
            <span class="large-kanji">信頼</span>
        </div>
    </div>

    <div class="bottom-section">
        <div class="barcode-container">
            <div class="bar w-2"></div>
            <div class="bar w-1"></div>
            <div class="bar w-4"></div>
            <div class="bar w-1"></div>
            <div class="w-space"></div>
            <div class="bar w-3"></div>
            <div class="bar w-1"></div>
            <div class="bar w-5"></div>
            <div class="bar w-2"></div>
            <div class="w-space"></div>
            <div class="bar w-1"></div>
            <div class="bar w-4"></div>
            <div class="bar w-2"></div>
            <div class="bar w-1"></div>
            <div class="bar w-3"></div>
            <div class="w-space"></div>
            <div class="bar w-5"></div>
            <div class="bar w-1"></div>
            <div class="bar w-2"></div>
            <div class="bar w-4"></div>
            <div class="w-space"></div>
            <div class="bar w-3"></div>
            <div class="bar w-1"></div>
            <div class="bar w-5"></div>
            <div class="bar w-1"></div>
            <div class="bar w-2"></div>
            <div class="w-space"></div>
            <div class="bar w-4"></div>
            <div class="bar w-2"></div>
            <div class="bar w-1"></div>
            <div class="bar w-3"></div>
            <div class="bar w-5"></div>
            <div class="w-space"></div>
            <div class="bar w-2"></div>
            <div class="bar w-1"></div>
            <div class="bar w-4"></div>
            <div class="bar w-1"></div>
            <div class="bar w-3"></div>
        </div>
    </div>

</body>
</html>
